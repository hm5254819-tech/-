name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - run: flutter create --project-name inventory_manager --platforms=android .

      - name: Write google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "project_info": {
              "project_number": "34208425796",
              "project_id": "inventory-app-780a1",
              "storage_bucket": "inventory-app-780a1.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:34208425796:android:fb08c810f24b3dbeadd911",
                  "android_client_info": {
                    "package_name": "com.example.inventory_manager"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyAe4RhXFJ4Q6e6IcAhOkJk98luWr7ZkxCs"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Patch Gradle for Firebase
        run: |
          cat >> android/build.gradle << 'EOF'

          buildscript {
              dependencies {
                  classpath 'com.google.gms:google-services:4.3.15'
              }
          }
          EOF

          sed -i 's/minSdk = .*/minSdk = 21/' android/app/build.gradle
          sed -i '/minSdk = 21/a\        multiDexEnabled = true' android/app/build.gradle
          cat >> android/app/build.gradle << 'EOF'

          apply plugin: 'com.google.gms.google-services'
          EOF

      - run: flutter pub get
      - run: flutter build apk --release
      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
