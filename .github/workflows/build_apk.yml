name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Create Fresh Flutter Android Project
        run: |
          flutter create --project-name inventory_manager --platforms=android .

      - name: Inject Firebase Config
        run: |
          mkdir -p android/app
          cat << 'EOF' > android/app/google-services.json
          {
            "project_info": {
              "project_number": "34208425796",
              "project_id": "inventory-app-780a1",
              "storage_bucket": "inventory-app-780a1.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:34208425796:android:fb08c810f24b3dbeadd911",
                  "android_client_info": {
                    "package_name": "com.example.inventory_manager"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyAe4RhXFJ4Q6e6IcAhOkJk98luWr7ZkxCs"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Patch Settings Gradle with Repositories
        run: |
          cat << 'EOF' > android/settings.gradle
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  def propertiesFile = new File(settingsDir, "local.properties")
                  if (propertiesFile.exists()) {
                      properties.load(new FileInputStream(propertiesFile))
                  }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
                  return flutterSdkPath
              }()
              includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          plugins {
              id "dev.flutter.flutter-plugin-loader" version "1.0.0"
              id "com.android.application" version "8.2.2" apply false
              id "org.jetbrains.kotlin.android" version "1.9.22" apply false
              id "com.google.gms.google-services" version "4.3.15" apply false
          }
          include ":app"
          EOF

      - name: Patch App Build Gradle Safely
        run: |
          cat << 'EOF' > android/app/build.gradle
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }

          android {
              namespace "com.example.inventory_manager"
              compileSdk 34

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              defaultConfig {
                  applicationId "com.example.inventory_manager"
                  minSdkVersion 21
                  targetSdkVersion 34
                  versionCode 1
                  versionName "1.0.0"
                  multiDexEnabled true
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }
          EOF

      - name: Build Release APK
        run: |
          flutter pub get
          flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
